<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Stats - 安全验证</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-[9999] flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-sm mx-4 text-center">
            <h2 class="text-2xl font-bold mb-6 text-indigo-400">身份验证</h2>
            <input type="password" id="passInput" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 mb-4 text-white focus:outline-none focus:border-indigo-500" placeholder="请输入访问密码">
            <button onclick="checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold transition text-lg">进入系统</button>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden">⚠️ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-6">
            <h1 class="text-2xl font-black text-indigo-400 tracking-tighter">AMAZON MUSIC INSIGHT</h1>
            <div id="adminTools" class="hidden flex gap-2">
                <label class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded text-[10px] font-bold cursor-pointer transition">
                    1. 导入趋势CSV <input type="file" id="trendFile" class="hidden">
                </label>
                <label class="bg-emerald-600 hover:bg-emerald-500 px-3 py-2 rounded text-[10px] font-bold cursor-pointer transition">
                    2. 导入详情CSV <input type="file" id="trackFile" class="hidden">
                </label>
                <button onclick="generateJSON()" class="bg-white text-black px-3 py-2 rounded text-[10px] font-black hover:bg-slate-200">合并生成</button>
            </div>
        </div>

        <div class="text-center py-20" id="noDataHint">
            <p class="text-slate-500 italic">暂无数据，请管理员导入 CSV 文件</p>
        </div>

        <div id="jsonResult" class="hidden mt-8 p-4 bg-black rounded border-2 border-dashed border-indigo-500">
            <p class="text-indigo-400 text-xs mb-2 font-bold font-mono">转换成功！请将下方内容覆盖到 data.json：</p>
            <textarea id="jsonOutput" class="w-full h-40 bg-slate-900 text-green-400 p-2 text-[10px] font-mono border-none focus:ring-0" readonly></textarea>
        </div>
    </div>

    <script>
        // --- 设置你的密码 ---
        const PASS_VIEW = "guest123";  
        const PASS_ADMIN = "admin888"; 

        function checkLogin() {
            const input = document.getElementById('passInput').value;
            const overlay = document.getElementById('loginOverlay');
            const main = document.getElementById('mainContent');
            const admin = document.getElementById('adminTools');

            if (input === PASS_ADMIN) {
                overlay.style.display = 'none';
                main.classList.remove('hidden');
                admin.classList.remove('hidden');
            } else if (input === PASS_VIEW) {
                overlay.style.display = 'none';
                main.classList.remove('hidden');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        // CSV 解析逻辑
        let tempTrend, tempTracks;
        document.getElementById('trendFile').onchange = (e) => {
            Papa.parse(e.target.files[0], { 
                header: true, 
                dynamicTyping: true,
                complete: (r) => { 
                    tempTrend = r.data.map(row => ({ 
                        date: row.Date || row['Reporting Date'], 
                        streams: row.Streams || row['Daily Streams'] || 0,
                        listeners: row.Listeners || 0
                    })).filter(i => i.date); 
                    alert("趋势数据读取成功！"); 
                } 
            });
        };

        document.getElementById('trackFile').onchange = (e) => {
            Papa.parse(e.target.files[0], { 
                header: true, 
                dynamicTyping: true,
                complete: (r) => { 
                    tempTracks = r.data.map(row => ({ 
                        name: row['Track Name'] || row['Song Title'] || 'Unknown', 
                        streams: row.Streams || row['Total Streams'] || 0 
                    })).filter(i => i.name && i.streams > 0); 
                    alert("单曲数据读取成功！"); 
                } 
            });
        };

        function generateJSON() {
            if(!tempTrend || !tempTracks) return alert("请先上传两个文件");
            const finalData = { trends: tempTrend, tracks: tempTracks };
            document.getElementById('jsonResult').classList.remove('hidden');
            document.getElementById('jsonOutput').value = JSON.stringify(finalData, null, 2);
        }
    </script>
</body>
</html>
