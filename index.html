<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据中心 - 安全登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80">
            <h2 class="text-xl font-bold mb-4 text-center text-indigo-400">请输入访问密码</h2>
            <input type="password" id="passInput" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 mb-4 focus:outline-none focus:border-indigo-500" placeholder="Password">
            <button onclick="checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg font-bold transition">进入系统</button>
            <p id="loginError" class="text-red-500 text-xs mt-3 text-center hidden">密码错误，请重新输入</p>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-6">
            <h1 class="text-2xl font-black text-indigo-400">AMAZON MUSIC INSIGHT</h1>
            <div id="adminTools" class="hidden flex gap-2">
                <label class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded text-xs font-bold cursor-pointer">
                    1. 导入趋势CSV <input type="file" id="trendFile" class="hidden">
                </label>
                <label class="bg-emerald-600 hover:bg-emerald-500 px-3 py-2 rounded text-xs font-bold cursor-pointer">
                    2. 导入详情CSV <input type="file" id="trackFile" class="hidden">
                </label>
                <button onclick="generateJSON()" class="bg-white text-black px-3 py-2 rounded text-xs font-black">合并生成</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="statsRow"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700 h-[400px]">
                <canvas id="mainChart"></canvas>
            </div>
            <div id="trackList" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 overflow-y-auto max-h-[400px]"></div>
        </div>

        <div id="jsonResult" class="hidden mt-8 p-4 bg-black rounded border-2 border-dashed border-indigo-500">
            <p class="text-indigo-400 text-sm mb-2 font-bold">合并成功！请手动更新 data.json：</p>
            <textarea id="jsonOutput" class="w-full h-32 bg-slate-900 text-green-400 p-2 text-xs font-mono"></textarea>
        </div>
    </div>

    <script>
        // --- 核心安全设置 ---
        const PASS_VIEW = "guest123";      // 访客密码（只能看）
        const PASS_ADMIN = "admin888";     // 管理员密码（能看+能上传）

        function checkLogin() {
            const input = document.getElementById('passInput').value;
            const overlay = document.getElementById('loginOverlay');
            const main = document.getElementById('mainContent');
            const admin = document.getElementById('adminTools');

            if (input === PASS_ADMIN) {
                overlay.style.display = 'none';
                main.classList.remove('hidden');
                admin.classList.remove('hidden'); // 显示上传按钮
                loadData();
            } else if (input === PASS_VIEW) {
                overlay.style.display = 'none';
                main.classList.remove('hidden');
                admin.remove(); // 彻底删除上传按钮
                loadData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        // --- 之前的数据加载和渲染逻辑 (保持不变) ---
        async function loadData() {
            const res = await fetch('data.json');
            const data = await res.json();
            if (data.trends) render(data);
        }

        // ... (此处省略之前写的 render, generateJSON 等逻辑，请确保在实际文件中补全) ...
        // 为了篇幅，下面直接补全核心渲染逻辑
        function render(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.trends.map(t => t.date),
                    datasets: [{ label: 'Streams', data: data.trends.map(t => t.streams), borderColor: '#818cf8', fill: true, backgroundColor: 'rgba(129, 140, 248, 0.1)' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
            // 渲染列表逻辑同上...
        }
        
        // 解析 CSV 逻辑同上...
        let tempTrend, tempTracks;
        document.getElementById('trendFile').onchange = (e) => {
            Papa.parse(e.target.files[0], { header: true, complete: (r) => { tempTrend = r.data.map(row => ({ date: row.Date || row['Reporting Date'], streams: row.Streams || 0 })); alert("趋势加载成功"); } });
        };
        document.getElementById('trackFile').onchange = (e) => {
            Papa.parse(e.target.files[0], { header: true, complete: (r) => { tempTracks = r.data.map(row => ({ name: row['Track Name'] || 'Unknown', streams: row.Streams || 0 })); alert("详情加载成功"); } });
        };
        function generateJSON() {
            const finalData = { trends: tempTrend, tracks: tempTracks };
            document.getElementById('jsonResult').classList.remove('hidden');
            document.getElementById('jsonOutput').value = JSON.stringify(finalData, null, 2);
        }
    </script>
</body>
</html>
